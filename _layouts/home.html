---
layout: default
title: Home
---

<header>
    <img src="/images/logo.JPG" width="500">
<p>{{ site.description | default: site.github.project_tagline }}</p>

</header>

        {{ content }}
        
        <ul>
  {% for post in site.posts %}

      <a href="{{ post.url }}">{{ post.title }}</a>
    </li>
  {% endfor %}
</ul>

<br><br><br>
{% capture footer_content %}
  {% include footer.md %}
{% endcapture %}
  {{ footer_content | markdownify }}
